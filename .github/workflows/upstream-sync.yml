name: Upstream sync

# Once a week, check whether TerrysPOV/ClaudeClaw-Plus's main has advanced past
# the SHA recorded in .upstream-ref. If so, open a `feat:` bump PR and
# immediately squash-merge it. The merge is authored by the RELEASE_BOT_TOKEN
# PAT (NOT the default GITHUB_TOKEN), so the push to main triggers release-please,
# which in turn auto-merges its release PR and dispatches docker-publish.
# End-to-end: cron -> ~10-15 min later, image is on GHCR. No human in the loop.

on:
  schedule:
    - cron: '37 9 * * 1'  # Mondays 09:37 UTC (staggered 20 min after vanilla's sync)
  workflow_dispatch:

permissions: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_BOT_TOKEN }}

      - name: Resolve upstream HEAD
        id: upstream
        run: |
          sha=$(git ls-remote https://github.com/TerrysPOV/ClaudeClaw-Plus HEAD | awk '{print $1}')
          if [ -z "$sha" ]; then
            echo "Failed to resolve upstream HEAD" >&2
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "short=${sha:0:7}" >> "$GITHUB_OUTPUT"

      - name: Compare with .upstream-ref
        id: diff
        run: |
          current=$(tr -d '[:space:]' < .upstream-ref 2>/dev/null || echo "")
          new="${{ steps.upstream.outputs.sha }}"
          if [ "$current" = "$new" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No upstream changes (still at $current)."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "previous=$current" >> "$GITHUB_OUTPUT"
            echo "Upstream advanced: ${current:-<none>} -> $new"
          fi

      - name: Bump, push, and merge
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
          NEW_SHA: ${{ steps.upstream.outputs.sha }}
          NEW_SHORT: ${{ steps.upstream.outputs.short }}
          PREV_SHA: ${{ steps.diff.outputs.previous }}
        run: |
          branch="chore/upstream-sync-${NEW_SHORT}"

          if gh pr list --head "$branch" --state open --json number --jq '.[0].number' | grep -q .; then
            echo "PR for $branch already open; nothing to do."
            exit 0
          fi

          # Commit under a stable bot identity; the push itself is authed by
          # the PAT (attributed to its owner in the repo's activity).
          git config user.name "claudeclaw-plus-release-bot"
          git config user.email "claudeclaw-plus-release-bot@users.noreply.github.com"

          git checkout -b "$branch"
          echo "$NEW_SHA" > .upstream-ref
          git add .upstream-ref
          git commit -m "feat: bump ClaudeClaw+ to ${NEW_SHORT}" \
                     -m "Upstream: https://github.com/TerrysPOV/ClaudeClaw-Plus/commit/${NEW_SHA}"
          git push -u origin "$branch"

          if [ -n "$PREV_SHA" ]; then
            compare_line="**Compare:** https://github.com/TerrysPOV/ClaudeClaw-Plus/compare/${PREV_SHA}...${NEW_SHA}"
          else
            compare_line="**Commit:** https://github.com/TerrysPOV/ClaudeClaw-Plus/commit/${NEW_SHA}"
          fi

          gh pr create \
            --base main \
            --head "$branch" \
            --title "feat: bump ClaudeClaw+ to ${NEW_SHORT}" \
            --body "Automated weekly upstream sync.

          ${compare_line}

          Squash-merged immediately by the release bot to trigger release-please."

          gh pr merge "$branch" --squash --delete-branch
