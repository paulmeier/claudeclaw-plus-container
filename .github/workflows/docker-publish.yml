name: Docker publish

# Builds the multi-arch image at the requested tag and pushes to ghcr.io
# with semver and `latest` tags. Triggered by release-please.yml after a
# release is cut, or manually via `gh workflow run docker-publish.yml
# --field tag=v1.2.3` (also via the Actions UI's "Run workflow" button).

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build and push (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  docker:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout at the tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      # Produces all relevant Docker tags, e.g. for v1.2.3:
      #   :1.2.3   :1.2   :1   :latest
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.tag }}
            type=semver,pattern={{major}},value=${{ inputs.tag }}
            type=raw,value=latest

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
